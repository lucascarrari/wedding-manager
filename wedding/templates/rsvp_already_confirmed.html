<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presença já confirmada</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'wedding/css/rsvp.css' %}">
</head>

<body>
  <div class="box">
    <h1>✅ Presença já confirmada</h1>

    <p class="subtitle">
      Oi, <strong>{{ guest.name }}</strong>!
    </p>

    <p class="lead">
      Sua presença já está marcada como <strong>confirmada</strong> no nosso sistema. 💚
    </p>

    <span class="badge">Status: Confirmado</span>

    <p class="hint">
      Se você precisar alterar algo, avise os noivos.
    </p>

    <div class="btn-row">
      <a class="btn" href="/">Voltar para a home</a>
    </div>
  </div>
</body>
</html>
